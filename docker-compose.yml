services:
  n8n:
    image: n8nio/n8n:latest
    container_name: discovery-agent-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - LOCAL_WORKER_PUBLIC_URL=${LOCAL_WORKER_PUBLIC_URL:-http://host.docker.internal:8765}
    volumes:
      - ./n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
